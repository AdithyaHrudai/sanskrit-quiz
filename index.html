<!doctype html>
<html lang="sa">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>संस्कृतप्रश्नमञ्जरी</title>
<style>
  :root {
    --ground: #F4EFE6;
    --card: #FDFAF3;
    --ink: #26221C;
    --ink-soft: #6B6154;
    --line: #E0D7C6;
    --accent: #A66A0E;
    --accent-soft: #F3E7CE;
    --gold: #C8891A;
    --good: #2E7D32;
    --good-soft: #E3F1E4;
    --bad: #C62828;
    --bad-soft: #FBE7E7;
    --shadow: 0 2px 12px rgba(60, 45, 20, .08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #171320;
      --card: #221C30;
      --ink: #EFE8D8;
      --ink-soft: #A79C86;
      --line: #372E4A;
      --accent: #E0A83A;
      --accent-soft: #33283D;
      --gold: #E0A83A;
      --good: #66BB6A;
      --good-soft: #1D3321;
      --bad: #EF5350;
      --bad-soft: #3B1D1F;
      --shadow: 0 2px 14px rgba(0, 0, 0, .35);
    }
  }
  :root[data-theme="light"] {
    --ground: #F4EFE6;
    --card: #FDFAF3;
    --ink: #26221C;
    --ink-soft: #6B6154;
    --line: #E0D7C6;
    --accent: #A66A0E;
    --accent-soft: #F3E7CE;
    --gold: #C8891A;
    --good: #2E7D32;
    --good-soft: #E3F1E4;
    --bad: #C62828;
    --bad-soft: #FBE7E7;
    --shadow: 0 2px 12px rgba(60, 45, 20, .08);
  }
  :root[data-theme="dark"] {
    --ground: #171320;
    --card: #221C30;
    --ink: #EFE8D8;
    --ink-soft: #A79C86;
    --line: #372E4A;
    --accent: #E0A83A;
    --accent-soft: #33283D;
    --gold: #E0A83A;
    --good: #66BB6A;
    --good-soft: #1D3321;
    --bad: #EF5350;
    --bad-soft: #3B1D1F;
    --shadow: 0 2px 14px rgba(0, 0, 0, .35);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--ground);
    color: var(--ink);
    font-family: 'Noto Serif Devanagari', 'Adobe Devanagari', 'Kohinoor Devanagari', 'Devanagari Sangam MN', 'Nirmala UI', 'Noto Sans Devanagari', 'Mangal', serif;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 16px 16px 40px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 14px 0 10px;
  }
  .masthead {
    font-size: 1.55rem;
    font-weight: 700;
    letter-spacing: .01em;
    color: var(--ink);
    text-wrap: balance;
    line-height: 1.3;
  }
  .masthead .danda { color: var(--gold); font-weight: 400; }
  .tagline {
    font-size: .85rem;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  .hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 10px 0 6px;
    font-variant-numeric: tabular-nums;
  }
  .hud .stat {
    font-size: .92rem;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .hud .stat b { color: var(--ink); font-weight: 700; }
  .bar {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: var(--line);
    overflow: hidden;
  }
  .bar i {
    display: block;
    height: 100%;
    width: 0%;
    background: var(--gold);
    border-radius: 3px;
    transition: width .25s ease;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 20px 18px 18px;
    margin-top: 10px;
    animation: slidein .18s ease;
  }
  @keyframes slidein {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
    .bar i { transition: none; }
  }

  .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .chip {
    font-size: .78rem;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 999px;
    padding: 4px 12px;
    letter-spacing: .02em;
  }
  .lvl {
    font-size: .78rem;
    color: var(--ink-soft);
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .lvl .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--good);
  }
  .lvl.l1 .dot { background: var(--gold); }
  .lvl.l2 .dot { background: var(--bad); }

  .qtext {
    font-size: 1.32rem;
    line-height: 1.55;
    font-weight: 600;
    margin: 0 0 18px;
    text-wrap: balance;
  }

  .opts {
    display: grid;
    gap: 10px;
  }
  .opt {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    text-align: left;
    font-family: inherit;
    font-size: 1.12rem;
    line-height: 1.45;
    color: var(--ink);
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 11px;
    padding: 13px 14px;
    min-height: 56px;
    cursor: pointer;
    transition: background .12s ease, border-color .12s ease, transform .06s ease;
  }
  .opt:not(:disabled):active { transform: scale(.985); }
  @media (hover: hover) {
    .opt:not(:disabled):hover { border-color: var(--gold); background: var(--accent-soft); }
  }
  .opt:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
  .opt .key {
    flex: none;
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    font-size: .85rem;
    color: var(--ink-soft);
  }
  .opt:disabled { cursor: default; }
  .opt.correct {
    background: var(--good-soft);
    border-color: var(--good);
    color: var(--ink);
  }
  .opt.correct .key { border-color: var(--good); background: var(--good); color: #fff; }
  .opt.wrong {
    background: var(--bad-soft);
    border-color: var(--bad);
  }
  .opt.wrong .key { border-color: var(--bad); background: var(--bad); color: #fff; }
  .opt.dim { opacity: .5; }

  .verdict {
    min-height: 1.6em;
    margin-top: 14px;
    font-size: 1rem;
    font-weight: 700;
    text-align: center;
  }
  .verdict.ok { color: var(--good); }
  .verdict.no { color: var(--bad); }

  /* ---------- start & end screens ---------- */
  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 30px 22px;
    margin-top: 14px;
    text-align: center;
    animation: slidein .18s ease;
  }
  .panel h2 {
    margin: 0 0 6px;
    font-size: 1.35rem;
    text-wrap: balance;
  }
  .panel p { color: var(--ink-soft); line-height: 1.7; margin: 8px 0 0; }
  .topics {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin: 18px 0 4px;
  }
  .bigscore {
    font-size: 3rem;
    font-weight: 700;
    color: var(--gold);
    margin: 12px 0 2px;
    font-variant-numeric: tabular-nums;
  }
  .btn {
    font-family: inherit;
    font-size: 1.15rem;
    font-weight: 700;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 999px;
    padding: 14px 38px;
    margin-top: 22px;
    cursor: pointer;
    transition: transform .06s ease, filter .12s ease;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(.97); }
  .btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 3px; }

  .ornament {
    text-align: center;
    color: var(--gold);
    font-size: 1.1rem;
    margin-top: 26px;
    letter-spacing: .3em;
    user-select: none;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>


<div class="wrap">
  <header>
    <div class="masthead"><span class="danda">॥</span> संस्कृतप्रश्नमञ्जरी <span class="danda">॥</span></div>
    <div class="tagline">गृहे एव संस्कृतक्रीडा — व्याकरणं, पुराणं, सुभाषितानि च</div>
  </header>

  <div class="hud hidden" id="hud">
    <span class="stat" id="prog">प्रश्नः १</span>
    <div class="bar"><i id="fill"></i></div>
    <span class="stat">अङ्काः <b id="score">०</b></span>
  </div>

  <!-- start screen -->
  <section class="panel" id="start">
    <h2>स्वागतम्&nbsp;!</h2>
    <p><span id="qcount"></span> प्रश्नाः — मिश्रितक्रमेण ।<br>
    सम्यक् उत्तरं <b style="color:var(--good)">हरितम्</b>, अशुद्धं <b style="color:var(--bad)">रक्तम्</b> भविष्यति ।</p>
    <div class="topics" id="topiclist"></div>
    <button class="btn" id="startbtn">आरभताम् →</button>
  </section>

  <!-- quiz card -->
  <section class="card hidden" id="quiz">
    <div class="meta">
      <span class="chip" id="topic"></span>
      <span class="lvl" id="lvl"><span class="dot"></span><span id="lvltxt"></span></span>
    </div>
    <p class="qtext" id="qtext"></p>
    <div class="opts" id="opts"></div>
    <div class="verdict" id="verdict" aria-live="polite"></div>
  </section>

  <!-- end screen -->
  <section class="panel hidden" id="end">
    <h2>क्रीडा समाप्ता&nbsp;!</h2>
    <div class="bigscore" id="final"></div>
    <p id="msg"></p>
    <button class="btn" id="again">पुनः क्रीडतु ↻</button>
  </section>

  <div class="ornament">❖ ❖ ❖</div>
</div>

<script>
'use strict';

/* ---------- question bank ----------
   t = topic, d = difficulty (0 easy, 1 medium, 2 hard)

   Sources: Paninian grammar, Amarakosha, Puranas, Upanishads,
   Ramayana, Mahabharata, subhashita collections, world geography. */

/* AUTO-GENERATED:TOPICS:END */

/* AUTO-GENERATED:QUESTIONS:START — overwritten daily by scripts/generate-questions.mjs, do not hand-edit */

/* ---------- helpers ---------- */
const $ = id => document.getElementById(id);
const DV = '०१२३४५६७८९';
const dv = n => String(n).replace(/\d/g, d => DV[d]);
const LVL = ['सरलम्', 'मध्यमम्', 'कठिनम्'];
const KEYS = ['क', 'ख', 'ग', 'घ'];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ---------- state ---------- */
let order = [], idx = 0, score = 0, locked = false, timer = null;

function buildOrder() {
  // fully jumbled — all topics and difficulties randomly mixed
  order = shuffle(BANK.slice());
}

/* ---------- screens ---------- */
function showStart() {
  const list = $('topiclist');
  list.innerHTML = '';
  Object.values(T).forEach(name => {
    const s = document.createElement('span');
    s.className = 'chip';
    s.textContent = name;
    list.appendChild(s);
  });
  const countText = $('qcount');
  if (countText) countText.textContent = dv(BANK.length);
}

function startGame() {
  buildOrder();
  idx = 0; score = 0;
  $('score').textContent = dv(0);
  $('start').classList.add('hidden');
  $('end').classList.add('hidden');
  $('hud').classList.remove('hidden');
  $('quiz').classList.remove('hidden');
  render();
}

function render() {
  clearTimeout(timer);
  locked = false;
  const q = order[idx];

  $('prog').textContent = 'प्रश्नः ' + dv(idx + 1) + ' / ' + dv(order.length);
  $('fill').style.width = (idx / order.length * 100) + '%';
  $('topic').textContent = T[q.t];
  $('lvl').className = 'lvl l' + q.d;
  $('lvltxt').textContent = LVL[q.d];
  $('qtext').textContent = q.q;
  $('verdict').textContent = '';
  $('verdict').className = 'verdict';

  const card = $('quiz');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = '';

  const box = $('opts');
  box.innerHTML = '';
  shuffle(q.a.map((text, i) => ({ text, ok: i === 0 }))).forEach((opt, i) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'opt';
    b.innerHTML = '<span class="key">' + KEYS[i] + '</span><span></span>';
    b.lastChild.textContent = opt.text;
    b.addEventListener('click', () => pick(b, opt.ok));
    box.appendChild(b);
  });
}

function pick(btn, ok) {
  if (locked) return;
  locked = true;

  const buttons = [...$('opts').children];
  buttons.forEach(b => { b.disabled = true; });

  if (ok) {
    btn.classList.add('correct');
    buttons.forEach(b => { if (b !== btn) b.classList.add('dim'); });
    score++;
    $('score').textContent = dv(score);
    $('verdict').textContent = 'साधु ! सम्यक् उत्तरम् ।';
    $('verdict').classList.add('ok');
  } else {
    btn.classList.add('wrong');
    buttons.forEach(b => {
      const q = order[idx];
      if (b.lastChild.textContent === q.a[0]) b.classList.add('correct');
      else if (b !== btn) b.classList.add('dim');
    });
    $('verdict').textContent = 'अशुद्धम् ! हरितम् एव सम्यक् ।';
    $('verdict').classList.add('no');
  }

  timer = setTimeout(next, ok ? 900 : 1600);
}

function next() {
  idx++;
  if (idx >= order.length) return finish();
  render();
}

function finish() {
  $('quiz').classList.add('hidden');
  $('hud').classList.add('hidden');
  $('fill').style.width = '100%';
  $('end').classList.remove('hidden');
  $('final').textContent = dv(score) + ' / ' + dv(order.length);

  const pct = score / order.length;
  let msg;
  if (pct >= 0.9)      msg = 'अद्भुतम् ! भवती तु साक्षात् विदुषी — सरस्वत्याः कृपा भवत्याम् अस्ति ।';
  else if (pct >= 0.7) msg = 'उत्तमम् ! संस्कृतज्ञानं प्रशंसनीयम् — किञ्चित् अभ्यासेन सर्वोत्तमं भविष्यति ।';
  else if (pct >= 0.5) msg = 'साधु ! अर्धाधिकं साधितम् — पुनः क्रीडित्वा अधिकं जानातु ।';
  else                 msg = 'शुभारम्भः ! अभ्यासेन एव विद्या वर्धते — पुनः प्रयतताम् ।';
  $('msg').textContent = msg;
}

/* ---------- wire up ---------- */
$('startbtn').addEventListener('click', startGame);
$('again').addEventListener('click', startGame);

document.addEventListener('keydown', e => {
  if ($('quiz').classList.contains('hidden') || locked) return;
  const n = '1234'.indexOf(e.key);
  if (n >= 0) {
    const b = $('opts').children[n];
    if (b) b.click();
  }
});

showStart();
</script>
